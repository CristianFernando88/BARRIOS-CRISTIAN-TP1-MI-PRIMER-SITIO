            <li><a href="./contacto.html">Contacto</a></li>

        </ul>

    <main>
        <section id="contacto" class="section-container">
            <div >
              <picture>
                <img src="/img/istockphoto-2022650788-1024x1024.jpg" alt="">
              </picture>
            </div>
            <div>
                <h1 class="title">Mis redes</h1>
                <ul class="social-links">
                    <li><img src="./img/thedigitalartist-linkedin-2815969_1280.jpg" alt="linkedin"><a href="https://www.linkedin.com/in/cristian-barrios-3b5b5b1b1/" target="_blank">LinkedIn</a></li>
                    <li><img src="./img/wedevlops-github-6648895_640.jpg" alt=""><a href="https://github.com/cristianbarrios" target="_blank">GitHub</a></li>
                    <li><img src="./img/thedigitalartist-facebook-2815970_640.jpg" alt=""><a href="https://facebook.com/cristianbarrios" target="_blank">facebook</a></li>
                </ul>
            </div>
           
        </section>
        <section id="contacto" class="section-container">
            <div >
                <h1 class="title">Contactame</h1>
                <p>¡Contáctame para más información!</p>
                <form action="" class="form-container">
                    
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ingresa tu nombre">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="ingresa tu correo">
                    <label for="genero">Genero:</label>
                    <select id="genero" name="genero" required>
                        <option value="">Selecciona tu género</option>
                        <option value="masculino">Masculino</option>
                        <option value="femenino">Femenino</option>
                        <option value="otro">Otro</option>
                    </select>
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" required></textarea>
                    <label for="terminos">Aceptor de términos y condiciones</label>
                    <input type="checkbox" id="terminos" name="terminos" required>
                    <button type="submit">Enviar</button>
                </form>
            </div>
            <div>
                <picture>
                    <img src="/img/istockphoto-2022650788-1024x1024.jpg" alt="">
                </picture>
            </div>
        </section>
